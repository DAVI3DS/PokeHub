<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando... - PokeHub</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 203, 5, 0.3);
      border-top-color: #ffcb05;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 8px 0; color: #5f838a; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Autenticando com Discord...</p>
    <p style="font-size:0.85rem">Você será redirecionado em instantes.</p>
  </div>

  <script src="auth-config.js"></script>
  <script>
    const { supabaseUrl, supabaseAnonKey } = window.AUTH_CONFIG || {};

    async function handleCallback() {
      try {
        // Aguardar o Supabase SDK carregar
        await new Promise((resolve, reject) => {
          if (window.supabase) { resolve(); return; }
          const s = document.createElement('script');
          s.src = 'https://unpkg.com/@supabase/supabase-js@2';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });

        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey, {
          auth: { storageKey: 'pokehub-auth', autoRefreshToken: true, persistSession: true }
        });

        // O Supabase já processa o token da URL automaticamente
        const { data: { session }, error } = await supabase.auth.getSession();

        if (session) {
          // Sessão estabelecida — redirecionar pro site
          window.location.href = '/PokeHub/';
        } else if (error) {
          document.body.innerHTML = '<div class="loading"><p style="color:#cc0000;">❌ Erro na autenticação.</p><p style="font-size:0.85rem">Tente novamente.</p><button onclick="window.location.href=\'/\'">Voltar</button></div>';
        } else {
          // Nada ainda, esperar um pouco
          setTimeout(() => window.location.href = '/PokeHub/', 2000);
        }
      } catch (e) {
        document.body.innerHTML = '<div class="loading"><p style="color:#cc0000;">❌ Erro ao conectar.</p><button onclick="window.location.href=\'/\'">Voltar</button></div>';
      }
    }

    handleCallback();
  </script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</body>
</html>
